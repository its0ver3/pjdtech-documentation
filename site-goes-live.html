<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Site Goes Live — PJD Tech</title>
  <style>
    body {
      font-family: monospace;
      max-width: 600px;
      margin: 0 auto;
      padding: 1em;
    }
    h1 {
      margin-bottom: 0;
    }
    h3 {
      margin-top: 0.2em;
      color: #555;
      font-weight: normal;
    }
    .toggle-dark {
      position: fixed;
      top: 0.75em;
      right: 0.75em;
      background: none;
      border: 1px solid #888;
      border-radius: 8px;
      padding: 0.4em 0.6em;
      font-size: 1.4rem;
      line-height: 1;
      min-width: 44px;
      min-height: 44px;
      cursor: pointer;
      color: inherit;
      z-index: 10;
    }
    body.dark {
      background: #1a1a1a;
      color: #e0e0e0;
    }
    body.dark h3 { color: #999; }
    body.dark a { color: #8ab4f8; }
    body.dark .toggle-dark { border-color: #666; }
  </style>
</head>
<body>
  <button class="toggle-dark" onclick="toggleDark()" aria-label="Toggle dark mode">🌙</button>
  <p><a href="index.html">← back</a></p>
  <h1>Site Goes Live</h1>
  <h3>2026-02-21 10:32 AM</h3>
  <p>
    This site was built with plain HTML and a tiny bit of inline CSS with the help of our good friend Claude Code.
  </p>
  <p>
    The source code lives in a public repo on GitHub and is hosted using
    GitHub Pages.
  </p>
  Stay tuned for updates!
  </p>
  <script>
    function toggleDark() {
      document.body.classList.toggle('dark');
      const on = document.body.classList.contains('dark');
      document.querySelector('.toggle-dark').textContent = on ? '☀️' : '🌙';
      localStorage.setItem('dark', on);
    }
    if (localStorage.getItem('dark') === 'true') toggleDark();
  </script>
</body>
</html>
